# ============================================================
# todo-service — Phase 3 Configuration
# ============================================================
# Bounded Context : Task Management
# Port            : 8082
# Database        : todosdb (H2 in-memory, OWNS the todos table)
#
# MICROSERVICES NOTE:
# user-service.url is the ONLY way this service knows about users.
# There is no UserRepository here. No shared DB.
# Phase 5 (Eureka) replaces this hardcoded URL with service discovery.
# ============================================================

server.port=8082
spring.application.name=todo-service

spring.datasource.url=jdbc:h2:mem:todosdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Phase 5: Eureka replaces the hardcoded URL ───────────────────────────────
# REMOVED: user-service.url=http://localhost:8081
# Feign now resolves "user-service" via Eureka. @FeignClient(name="user-service")
# Spring Cloud LoadBalancer picks a live instance using round-robin.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# --- Feign timeouts (always set — never wait forever) ---
spring.cloud.openfeign.client.config.user-service.connect-timeout=3000
spring.cloud.openfeign.client.config.user-service.read-timeout=5000

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.com.microlearning=DEBUG
# Log all Feign HTTP calls — very useful for debugging inter-service issues
logging.level.feign=DEBUG

# ─── Spring Cloud Config Client ───────────────────────────────────────────────
spring.config.import=optional:configserver:http://localhost:8888
management.endpoints.web.exposure.include=health,info,refresh

# ─── Resilience4j Circuit Breaker ────────────────────────────────────────────
resilience4j.circuitbreaker.instances.user-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.user-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.user-service.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.user-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.user-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.user-service.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.instances.user-service.slow-call-rate-threshold=50

# ─── Resilience4j Retry ───────────────────────────────────────────────────────
resilience4j.retry.instances.user-service.max-attempts=3
resilience4j.retry.instances.user-service.wait-duration=1s
resilience4j.retry.instances.user-service.retry-exceptions=java.io.IOException,feign.FeignException

# ─── Resilience4j Bulkhead (Semaphore) ───────────────────────────────────────
resilience4j.bulkhead.instances.user-service.max-concurrent-calls=10
resilience4j.bulkhead.instances.user-service.max-wait-duration=100ms

# ─── Expose Resilience4j metrics via Actuator ─────────────────────────────────
# Visit: GET /actuator/circuitbreakers  to see live CB state
management.endpoints.web.exposure.include=health,info,refresh,circuitbreakers,retries
management.endpoint.circuitbreakers.enabled=true
management.health.circuitbreakers.enabled=true


# ─── Kafka (for OutboxPublisher) ──────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
