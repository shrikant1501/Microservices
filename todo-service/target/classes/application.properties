# ============================================================
# todo-service — Phase 3 Configuration
# ============================================================
# Bounded Context : Task Management
# Port            : 8082
# Database        : todosdb (H2 in-memory, OWNS the todos table)
#
# MICROSERVICES NOTE:
# user-service.url is the ONLY way this service knows about users.
# There is no UserRepository here. No shared DB.
# Phase 5 (Eureka) replaces this hardcoded URL with service discovery.
# ============================================================

server.port=8082
spring.application.name=todo-service

spring.datasource.url=jdbc:h2:mem:todosdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- OpenFeign: user-service URL ---
# Phase 5: Replace with Eureka service discovery (remove this line)
# Phase 3: Hardcoded URL — only valid for local development
user-service.url=http://localhost:8081

# --- Feign client configuration ---
# These timeouts prevent thread exhaustion (Phase 8 adds circuit breaker on top)
spring.cloud.openfeign.client.config.user-service.connect-timeout=3000
spring.cloud.openfeign.client.config.user-service.read-timeout=5000

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.com.microlearning=DEBUG
# Log all Feign HTTP calls — very useful for debugging inter-service issues
logging.level.feign=DEBUG
