# ─────────────────────────────────────────────────────────────────────────────
# user-service.yml — config specific to user-service (default profile)
# ─────────────────────────────────────────────────────────────────────────────
# Overrides anything in application.yml for this service only.

server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:usersdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:   # empty — real services use Vault for credentials
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false          # turned off — SQL noise in logs
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.microlearning: DEBUG  # override shared default for this service
