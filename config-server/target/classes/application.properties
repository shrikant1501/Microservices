server.port=8888
spring.application.name=config-server

# ─── Config source: local filesystem (for learning) ──────────────────────────
# For production: replace with a Git URI:
#   spring.cloud.config.server.git.uri=https://github.com/yourorg/config-repo
#   spring.cloud.config.server.git.default-label=main
#   spring.cloud.config.server.git.search-paths=config
#
# For this course we use the native (filesystem) backend pointing to the
# config-repo/ directory inside this project.
# This is production-equivalent in structure — only the backend differs.
spring.cloud.config.server.native.search-locations=classpath:/config-repo
spring.profiles.active=native

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.config=DEBUG
