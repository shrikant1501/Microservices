# ============================================================
# Todo Monolith — Phase 1 Configuration
# ============================================================
#
# ARCHITECTURE NOTE:
# Notice ALL configuration for ALL modules lives in this single file.
# If the User module needs a different DB connection pool size than the
# Todo module, they share the same pool — no individual tuning possible.
#
# In microservices:
# - Each service has its own application.properties
# - Phase 7 introduces Spring Cloud Config Server to manage
#   all these config files centrally (externalized configuration)
#
# ============================================================

server.port=8080
spring.application.name=todo-monolith

# --- H2 In-Memory Database ---
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Console (dev only — NEVER expose in production) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Actuator ---
# Exposes health, info, metrics endpoints
# In microservices, every service exposes these and they are
# collected by a central monitoring system (Prometheus + Grafana)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# --- Logging ---
# In microservices, structured JSON logging + correlation IDs are required
# We will configure those in Phase 11 (Observability)
logging.level.com.microlearning=DEBUG
logging.level.org.springframework.web=INFO
