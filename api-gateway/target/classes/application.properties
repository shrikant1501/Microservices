server.port=8080
spring.application.name=api-gateway

# ─── Eureka ───────────────────────────────────────────────────────────────────
# Gateway registers with Eureka so it can use lb:// routing
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ─── Routes ───────────────────────────────────────────────────────────────────
#
# lb://service-name = load-balanced via Eureka (Spring Cloud LoadBalancer)
# This is the ONLY place clients need to know about. All service IPs are hidden.
#
# CRITICAL ARCHITECTURE POINT:
# Clients call: POST http://localhost:8080/api/users
# Gateway sees: path matches /api/users/** → route to lb://user-service
# Eureka resolves: lb://user-service → http://10.0.1.5:8081
# Gateway forwards: POST http://10.0.1.5:8081/api/users
#
# The internal IP never leaves the network. Clients are completely decoupled
# from service topology.

spring.cloud.gateway.routes[0].id=user-service-route
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=todo-service-route
spring.cloud.gateway.routes[1].uri=lb://todo-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/todos/**

# ─── Default filters applied to ALL routes ────────────────────────────────────
# Add response time header on every response — useful for observability
spring.cloud.gateway.default-filters[0]=AddResponseHeader=X-Response-Time, ${spring.application.name}

# ─── Actuator ─────────────────────────────────────────────────────────────────
# /actuator/gateway/routes — see all configured routes at runtime
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.microlearning=DEBUG
