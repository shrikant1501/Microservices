# ─── Disable Eureka in tests ──────────────────────────────────────────────────
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# ─── JWT test secret (same key the test will use to sign tokens) ──────────────
# Must be ≥256 bits for HMAC-SHA256 (32+ chars)
jwt.secret=microlearning-dev-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.public-paths=/api/auth/**,/actuator/**
