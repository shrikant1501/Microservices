# ============================================================
# user-service — Phase 3 Configuration
# ============================================================
# Bounded Context : User Management
# Port            : 8081
# Database        : users_db (H2 in-memory, OWNS the users table)
#
# MICROSERVICES NOTE:
# This service has its own application.properties, its own DB URL,
# its own port. Completely independent from todo-service.
# Phase 7 (Spring Cloud Config) will move these properties to a
# central config server so they can be managed without redeployment.
# ============================================================

server.port=8081
spring.application.name=user-service

# --- Separate H2 database (owns the users table) ---
spring.datasource.url=jdbc:h2:mem:usersdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.com.microlearning=DEBUG

# --- Kafka (producer) ---
# Connects to local Kafka. Docker Compose in Phase 12 will start Kafka automatically.
spring.kafka.bootstrap-servers=localhost:9092

# ─── Eureka Client ────────────────────────────────────────────────────────────
# Register this service with Eureka. The name "user-service" is what other
# services use in their @FeignClient(name = "user-service")
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Heartbeat / lease config (fine-tuned for fast dev feedback)
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
