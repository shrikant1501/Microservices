# ============================================================
# user-service — Phase 3 Configuration
# ============================================================
# Bounded Context : User Management
# Port            : 8081
# Database        : users_db (H2 in-memory, OWNS the users table)
#
# MICROSERVICES NOTE:
# This service has its own application.properties, its own DB URL,
# its own port. Completely independent from todo-service.
# Phase 7 (Spring Cloud Config) will move these properties to a
# central config server so they can be managed without redeployment.
# ============================================================

server.port=8081
spring.application.name=user-service

# --- Separate H2 database (owns the users table) ---
spring.datasource.url=jdbc:h2:mem:usersdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.com.microlearning=DEBUG

# --- Kafka (producer) ---
# Connects to local Kafka. Docker Compose in Phase 12 will start Kafka automatically.
spring.kafka.bootstrap-servers=localhost:9092

# ─── Eureka Client ────────────────────────────────────────────────────────────
# Register this service with Eureka. The name "user-service" is what other
# services use in their @FeignClient(name = "user-service")
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Heartbeat / lease config (fine-tuned for fast dev feedback)
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ─── Spring Cloud Config Client ───────────────────────────────────────────────
# Fetch config from config-server at startup (before Spring context initialises).
# "optional:" = fall back to local properties if config-server is unreachable (dev).
# Remove "optional:" in production → fail-fast on missing config.
spring.config.import=optional:configserver:http://localhost:8888

# Expose /actuator/refresh so @RefreshScope beans can be updated without restart
management.endpoints.web.exposure.include=health,info,refresh,metrics

# ─── Phase 11: Micrometer Tracing ────────────────────────────────────────────
# Sample 100% in dev — send every request as a trace to Zipkin.
# In production: set to 0.1 (10%) to reduce overhead.
management.tracing.sampling.probability=1.0
# Zipkin endpoint (Docker Compose in Phase 12 will start Zipkin at :9411)
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ─── Log pattern: include correlationId + traceId on every line ──────────────
# %X{correlationId} = from our CorrelationIdMdcFilter
# %X{traceId}       = from Micrometer Tracing (auto-injected into MDC)
# %X{spanId}        = from Micrometer Tracing
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [${spring.application.name},%X{traceId:--},%X{spanId:--}][%X{correlationId:--}] %logger{36} - %msg%n
