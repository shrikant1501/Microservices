server.port=8761
spring.application.name=eureka-server

# ─── Do NOT register the server itself as a client ───────────────────────────
# In production with multiple Eureka peers, set these to point at each other.
# For a single-server dev setup, set both to false.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# ─── Self-preservation ────────────────────────────────────────────────────────
# Disable in dev — prevents stale instances lingering after ctrl+C
# In production: set to true (default)
eureka.server.enable-self-preservation=false
eureka.server.eviction-interval-timer-in-ms=5000

# ─── Dashboard ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
